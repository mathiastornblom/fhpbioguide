<!DOCTYPE html>
<html lang="sv-SE">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<link
			rel="stylesheet"
			id="typography-font-css"
			href="https://cloud.typography.com/7834156/7581372/css/fonts.css?ver=1.0"
			type="text/css"
			media="all"
		/>
		<link
			rel="stylesheet"
			id="typotheque-font-css"
			href="https://fonts.typotheque.com/WF-028850-009702.css?ver=1.0"
			type="text/css"
			media="all"
		/>
		<link rel="stylesheet" href="/css/style.css" type="text/css" />
		<title>FHP - Rapportera förköp</title>
	</head>
	<body>

		<nav class="site-nav">
			<img
				src="https://www.folketshusochparker.se/wp-content/themes/fhp/assets/img/logo-white-landscape.svg"
				height="28"
				alt="Folkets Hus &amp; Parker"
			/>
		</nav>

		<header class="page-header">
			<div class="page-header-inner">
				<h1>{{.Title}}</h1>
				<p>Rapportera totala förköp för nedanstående evenemang</p>
			</div>
		</header>

		<main class="page-content">
			<form action="/form-post/{{.ID}}" method="POST" id="report-form">
				{{range $i, $e := .Events}}
				<div class="event-card">
					<h3>{{.Name}}</h3>
					<p class="event-meta">{{.Date}}</p>

					{{if gt .Amount 0}}
					<p class="prev-report">Senast rapporterat: <strong>{{.Amount}}</strong> förköp</p>
					{{end}}

					<div class="field-group">
						<label for="00_{{$i}}">Totalt antal förköp</label>
						<input
							type="number"
							id="00_{{$i}}"
							name="00_{{$i}}"
							value="{{.Amount}}"
							min="0"
						/>
					</div>

					<div class="field-group">
						<label for="10_{{$i}}">Biljettlänk</label>
						<input
							type="url"
							id="10_{{$i}}"
							name="10_{{$i}}"
							value="{{.Url}}"
							placeholder="https://"
						/>
					</div>

					{{if .Discounts}}
					<p class="discount-info">{{.Discounts}}</p>
					{{end}}
				</div>
				{{end}}

				<button type="submit" class="btn-submit" id="submit-btn">
					<span class="btn-spinner"></span>
					<span class="btn-label">Skicka in</span>
				</button>
			</form>
		</main>

		<footer class="page-footer">
			<p>Live på Bio / Folkets Hus och Parker</p>
		</footer>

		<script src="/script/formValidation.js"></script>
	</body>
</html>
